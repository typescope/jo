site_name: Jo Programming Language
site_description: Secure programming for the AI era
site_url: https://jo-lang.org
repo_url: https://github.com/liufengyun/jo
repo_name: liufengyun/jo

# Use existing docs directory
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra_css:
  - css/mkdocs-extra.css

nav:
  - Overview:
    - What is Jo?: overview/what-is-jo.md
    - Language Tour: overview/language-tour.md
    - Capability-Based Security: overview/capabilities.md
  
  - AI Security:
    - The Security Problem: security/security-problem.md
    - Jo's Solution: security/solution.md
  
  - Security Demos:
    - Overview: demos/index.md
    - Process Monitor: demos/process-monitor.md
    - Data Table Security: demos/data-table.md
    - Query DSL: demos/query-dsl.md
  
  - Language Tutorial:
    - Quick Start: language/quick-start.md
    - Syntax Highlights: language/syntax.md
    - Download & Install: language/download.md
  
  - Language Reference:
    - Multiline Strings: language/multiline-string.md
    - Block Comments: language/block-comment.md
    - Varargs: language/varargs.md
    - Deferred Functions: language/deferred-functions.md