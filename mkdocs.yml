# First run `pip install -e docs/` to install the jo_lexer for code highlighting
# Then run `mkdocs serve` or `mkdocs build`

site_name: Jo Programming Language
site_description: Secure programming for the AI era
site_url: https://jo-lang.org
repo_url: https://github.com/liufengyun/jo
repo_name: liufengyun/jo

# Use existing docs directory
docs_dir: docs

theme:
  name: material
  logo: img/logo.svg
  favicon: img/logo-black.svg

  features:
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

  icon:
    annotation: material/plus-circle

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra_css:
  - css/highlight-modern.css
  - css/mkdocs-extra.css

nav:
  - Overview:
    - What is Jo?: index.md
    - Language Tour: overview/language-tour.md
    - Capability-Oriented Programming: overview/capabilities.md
    - Pattern-Oriented Programming: overview/patterns.md
    - Get Started: overview/get-started.md

  - AI Security:
