name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - 'mkdocs.yml'
      - 'assets/**'

  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - 'mkdocs.yml'
      - 'assets/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - uses: actions/checkout@v2

      - name: Cache Ivy, Maven, Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.m2/repository
            ~/.cache/coursier
            ~/.cache/scalacli/local-repo
            ~/.cache/bloop
          key: build-cache-${{ hashFiles('project.scala') }}

      - uses: VirtusLab/scala-cli-setup@main
        with:
          jvm: liberica:17

      - uses: actions/setup-node@v6
        with:
          node-version: 24


      - name: build
        run: ./build -native

      - name: run tests
        run: ./ci
