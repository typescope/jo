name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Cache Ivy, Maven, Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.m2/repository
            ~/.cache/coursier
            ~/.cache/scalacli/local-repo
            ~/.cache/bloop
          key: build-cache-${{ hashFiles('project.scala') }}

      - uses: VirtusLab/scala-cli-setup@main
      - uses: actions/setup-node@v4

      - name: build
        run: ./build

      - name: run tests
        run: ./ci
