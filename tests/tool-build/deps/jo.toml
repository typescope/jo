jo = "1.0"

[module.app]
kind = "app"
platform = "python"
src = ["src/"]
depth = 2

dependencies = [
  { path = "helpers", module = "lib" },
  { package = "greeter-pkg", version = "1.0" },
]

[module.test]
kind = "app"
platform = "python"
src = ["tests/*.jo"]

dependencies = [
  { module = "app" },
  { package = "test-pkg", version = "1.0" },
]
