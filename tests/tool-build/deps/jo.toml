jo = "1.0"

[module.app]
kind = "app"
platform = "python"
src = ["src/"]
depth = 2

modules = [{ id = "lib", path = "helpers" }]
packages = [{ name = "greeter-pkg", version = "1.0" }]

[module.test]
kind = "app"
platform = "python"
src = ["tests/*.jo"]

modules = ["app"]
packages = [{ name = "test-pkg", version = "1.0" }]
