jo = "1.0"

[module.app]
kind = "app"
platform = "python"
src = ["src/"]
depth = 3

dependencies = [
  { package = "alpha-pkg", version = "1.0" },
  { path = "z-local", module = "lib" },
]

[module.test]
kind = "app"
platform = "python"
src = ["tests/*.jo"]

dependencies = [
  { module = "app" },
  { package = "test-only-pkg", version = "1.0" },
]
