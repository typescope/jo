namespace = "MyApp"
version = "1.0.0"
platform = "pure"

[module.app]
kind = "app"
platform = "python"
src = ["src/", "vendor/"]

dependencies = [
  { path = "../utils", module = "utils" },
  { package = "http", version = "1.0" },
]

links = [
  { from = "MyApp.Iface.run", to = "MyApp.Impl.run" },
]

[module.test]
kind = "app"
platform = "python"
src = ["tests/"]

dependencies = [
  { module = "app" },
  { path = "../testlib", module = "testlib" },
]
