namespace = "MyApp"
version = "1.0.0"
platform = "pure"

[module.app]
kind = "app"
platform = "python"
src = ["src/", "vendor/"]

modules = [{ id = "utils", path = "../utils" }]
packages = [{ name = "http", version = "1.0" }]

links = [
  { from = "MyApp.Iface.run", to = "MyApp.Impl.run" },
]

[module.test]
kind = "app"
platform = "python"
src = ["tests/"]

modules = [
  "app",
  { id = "testlib", path = "../testlib" },
]
