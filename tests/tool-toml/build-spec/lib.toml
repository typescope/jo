jo = "1.0"

[module.api]
kind = "lib"
src = ["api/src/"]

dependencies = [
  { package = "jo-core", version = "1.0" },
]

[module.api.package]
name = "agent-api"
version = "1.0.0"
description = "Sandbox agent framework API"

[module.test]
kind = "app"
platform = "python"
src = ["test/src/"]

dependencies = [
  { module = "api" },
  { package = "jo-test", version = "0.1" },
]
