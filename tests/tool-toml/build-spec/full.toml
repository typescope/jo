jo = "1.0"
default = "app"

[pinning]
mustache = "1.2.3"

[doc]
title = "My App API"
include-private = true
include-source = true

[module.app]
kind = "app"
src = ["src/", "vendor/"]
target = "python"
depth = 2

dependencies = [
  { path = "../utils", module = "utils" },
  { package = "http", version = "1.0" },
  { path = "../runtime", module = "agent-runtime", link = true },
]

links = [
  { from = "MyApp.Iface.run", to = "MyApp.Impl.run" },
]

[module.test]
kind = "app"
src = ["tests/"]
depth = 3

dependencies = [
  { module = "app" },
  { path = "../testlib", module = "testlib" },
]
