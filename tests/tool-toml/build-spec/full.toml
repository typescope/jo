jo = "1.0"
default = "app"

[pinning]
mustache = "1.2.3"

[doc]
title = "My App API"
include-private = true
include-source = true

[module.app]
kind = "app"
src = ["src/", "vendor/"]
platform = "python"
depth = 2

modules = [
  { id = "utils", path = "../utils" },
  { id = "agent-runtime", path = "../runtime", link = true },
]
packages = [{ name = "http", version = "1.0" }]

links = [
  { from = "MyApp.Iface.run", to = "MyApp.Impl.run" },
]

[module.test]
kind = "app"
platform = "python"
src = ["tests/"]
depth = 3

modules = [
  "app",
  { id = "testlib", path = "../testlib" },
]
